<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ARSIP | INSPEKTORAT TANA TORAJA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-slate-100">

    <div id="loginPage" class="fixed inset-0 z-50 flex items-center justify-center bg-blue-900">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-sm w-full">
            <h1 class="text-2xl font-bold text-slate-800">E-Arsip</h1>
            <p class="text-blue-600 font-bold mb-8">INSPEKTORAT TANA TORAJA</p>
            <button onclick="masuk()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">MASUK SISTEM</button>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-white p-8 flex-shrink-0">
            <div class="mb-10">
                <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mb-1">Aplikasi Digital</p>
                <h2 class="text-lg font-bold leading-tight">INSPEKTORAT<br>TANA TORAJA</h2>
            </div>
            <nav class="space-y-4">
                <div class="flex items-center gap-3 p-4 bg-blue-600 rounded-xl"><i data-lucide="layout-grid"></i> Dashboard</div>
                <div class="flex items-center gap-3 p-4 text-slate-400"><i data-lucide="file-text"></i> Data Dokumen</div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-24 bg-white border-b px-10 flex items-center justify-between">
                <h2 class="text-2xl font-bold text-slate-800 uppercase tracking-tight">
                    E-Arsip Inspektorat Tana Toraja
                </h2>
                <div class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-xs font-bold uppercase">Database Terhubung</div>
            </header>

            <div class="p-10 flex-1">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-6 text-sm font-bold text-slate-500 uppercase">Nama Dokumen</th>
                                <th class="p-6 text-sm font-bold text-slate-500 uppercase">Tanggal</th>
                                <th class="p-6 text-sm font-bold text-slate-500 uppercase">Kategori</th>
                                <th class="p-6 text-sm font-bold text-slate-500 uppercase text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="documentTableBody">
                            <tr><td colspan="4" class="p-20 text-center text-slate-400 italic">Menarik data dari Spreadsheet...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywR5hU_FSCBm4_6-o9bEfdN5WcFJViWj33bbUIzs5zCBa8QQcO7mTF1DDJ4DNmIX2V/exec";

        function masuk() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            loadData();
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                const tbody = document.getElementById('documentTableBody');
                tbody.innerHTML = '';
                
                data.forEach(doc => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-6 font-bold text-slate-700">${doc.nama || '-'}</td>
                            <td class="p-6 text-slate-500">${doc.tanggal || '-'}</td>
                            <td class="p-6"><span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg text-xs font-bold">${doc.jenis || '-'}</span></td>
                            <td class="p-6 text-center"><a href="${doc.link}" target="_blank" class="text-blue-600 font-bold text-sm">LIHAT FILE</a></td>
                        </tr>`;
                });
                lucide.createIcons();
            } catch (e) {
                console.error("Gagal memuat data");
            }
        }
        lucide.createIcons();
    </script>
</body>
</html>
