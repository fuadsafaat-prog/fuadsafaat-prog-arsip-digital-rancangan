<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>E-Arsip | Inspektorat Tana Toraja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-slate-100">

    <div id="loginPage" class="fixed inset-0 z-[999] flex items-center justify-center bg-slate-900 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-sm w-full">
            <h1 class="text-2xl font-bold text-slate-800">E-Arsip</h1>
            <p class="text-blue-600 font-bold mb-8 uppercase text-sm">Inspektorat Tana Toraja</p>
            
            <form id="loginForm" class="text-left space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Email Instansi</label>
                    <input type="email" id="userEmail" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Password</label>
                    <input type="password" id="userPass" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">
                    VERIFIKASI MASUK
                </button>
            </form>
            <p id="errorMsg" class="mt-4 text-red-500 text-xs font-bold hidden">Email atau Password salah!</p>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-white p-8 flex-shrink-0 flex flex-col">
            <h2 class="text-lg font-bold border-b border-slate-700 pb-4 mb-6 uppercase">Inspektorat<br>Tana Toraja</h2>
            <nav class="flex-1 space-y-2">
                <div class="flex items-center gap-3 p-4 bg-blue-600 rounded-xl text-sm font-bold"><i data-lucide="layout-grid"></i> Dashboard</div>
            </nav>
            <button onclick="location.reload()" class="w-full py-3 bg-red-600/20 text-red-500 rounded-xl font-bold border border-red-600/30">KELUAR</button>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-20 bg-white border-b px-10 flex items-center justify-between">
                <h2 class="text-xl font-bold text-slate-800">E-Arsip Inspektorat Tana Toraja</h2>
                <div class="flex items-center gap-2"><span id="displayName" class="text-sm font-bold text-slate-600">User</span></div>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-5 text-xs font-bold uppercase text-slate-500">Nama Dokumen</th>
                                <th class="p-5 text-xs font-bold uppercase text-slate-500">Tanggal</th>
                                <th class="p-5 text-xs font-bold uppercase text-slate-500">Kategori</th>
                                <th class="p-5 text-xs font-bold uppercase text-slate-500">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="documentTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGkYy9cy5FH5sk8l849ytvYQKojh1ulDueVil6AY94vHylCi2boGjAtzinMX5RGFfr/exec";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('errorMsg');

            btn.innerText = "Memverifikasi...";
            btn.disabled = true;

            try {
                const response = await fetch(`${SCRIPT_URL}?action=login&email=${email}&pass=${pass}`);
                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('displayName').innerText = result.user;
                    loadData();
                } else {
                    error.classList.remove('hidden');
                    btn.innerText = "VERIFIKASI MASUK";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Gagal terhubung ke server.");
                btn.disabled = false;
            }
        });

        async function loadData() {
            const tbody = document.getElementById('documentTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center">Memuat data arsip...</td></tr>';
            
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                tbody.innerHTML = '';
                
                data.forEach(doc => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-5 font-bold text-slate-700">${doc.nama || '-'}</td>
                            <td class="p-5 text-slate-500">${doc.tanggal || '-'}</td>
                            <td class="p-5 text-blue-600 text-xs font-bold uppercase">${doc.jenis || '-'}</td>
                            <td class="p-5"><a href="${doc.link}" target="_blank" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-xs font-bold">BUKA</a></td>
                        </tr>`;
                });
                lucide.createIcons();
            } catch (e) {
                console.error("Gagal ambil data");
            }
        }
        lucide.createIcons();
    </script>
</body>
</html>
